name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p /home/${{ secrets.SSH_USER }}/domains/rudraspirit.com/public_html
            cd /home/${{ secrets.SSH_USER }}/domains/rudraspirit.com/public_html
            if [ ! -d ".git" ]; then
              echo "Initializing repository on Hostinger..."
              git init
              git remote add origin https://github.com/nandha3d/rudraspirit.git
              git fetch origin
              git checkout -f main
            fi
            bash deploy.sh
